  <circle cx="720" cy="540" r="240" fill="#10b981" opacity="0.10" filter="url(#blur)" />

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" fill="#eaeaf2">
